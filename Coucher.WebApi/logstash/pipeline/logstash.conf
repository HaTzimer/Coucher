input {
  udp {
    port => 12201
    codec => plain { charset => "UTF-8" }
  }
}

filter {
  # log4net pattern: "%utcdate %-5level %logger - %message%newline"
  dissect {
    mapping => {
      "message" => "%{[@metadata][utcdate]} %{[@metadata][level]} %{[@metadata][logger]} - %{[@metadata][json]}"
    }
  }

  # The app emits JSON as the message body.
  json {
    source => "[@metadata][json]"
  }

  mutate {
    add_field => {
      "logger" => "%{[@metadata][logger]}"
      "level" => "%{[@metadata][level]}"
    }
    remove_field => ["[@metadata][json]"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "coucher-webapi-%{+YYYY.MM.dd}"
  }
}

