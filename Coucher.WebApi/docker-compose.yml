services:
  redis:
    image: redis:7.2-alpine
    container_name: coucher-redis
    command: ["redis-server", "--requirepass", "CoucherRedis123!"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "CoucherRedis123!", "ping"]
      interval: 5s
      timeout: 3s
      retries: 40

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: coucher-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "ChangeMe123!"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" -b -o /dev/null"
        ]
      interval: 5s
      timeout: 3s
      retries: 40

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: coucher-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.enrollment.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elastic-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/9200'"]
      interval: 5s
      timeout: 3s
      retries: 40

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    container_name: coucher-logstash
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "12201:12201/udp"
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    environment:
      LS_JAVA_OPTS: "-Xms256m -Xmx256m"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: coucher-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: "http://elasticsearch:9200"
    ports:
      - "5601:5601"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/5601'"]
      interval: 5s
      timeout: 3s
      retries: 40

  migrate:
    build:
      context: ..
      dockerfile: Coucher.WebApi/Dockerfile
      target: build
      additional_contexts:
        infra: ../../Infra.Core
    container_name: coucher-migrate
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Local
      SqlDb__uri: mssql
      SqlDb__initialCatalog: Coucher
      SqlDb__userId: sa
      SqlDb__password: "ChangeMe123!"
    working_dir: /src
    command:
      [
        "bash",
        "-lc",
        "dotnet ef database update --project Coucher.Lib/Coucher.Lib.csproj --startup-project Coucher.WebApi/Coucher.WebApi.csproj"
      ]
    restart: "no"

  webapi:
    build:
      context: ..
      dockerfile: Coucher.WebApi/Dockerfile
      target: runtime
      additional_contexts:
        infra: ../../Infra.Core
    container_name: coucher-webapi
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Local
      SqlDb__uri: mssql
      SqlDb__initialCatalog: Coucher
      SqlDb__userId: sa
      SqlDb__password: "ChangeMe123!"
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  mssql-data:
  elastic-data:
